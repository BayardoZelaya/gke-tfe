name: "Terraform Automation"

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: "ubuntu-latest"

    environment: dev

    env:
      GCP_PROJECT_ID: ${{vars.GCP_PROJECT_ID}}
      GCP_SERVICE_ACCOUNT: ${{vars.GCP_SERVICE_ACCOUNT}}
      GCP_PROJECT_NUMBER: ${{vars.GCP_PROJECT_NUMBER}}
      GCP_TF_BUCKET: ${{vars.GCP_TF_BUCKET}}

    defaults:
      run:
        shell: bash

    steps:
      - name: "Checkout Code"
        uses: "actions/checkout@v4"

      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          project_id: ${{env.GCP_PROJECT_ID}}
          service_account: ${{env.GCP_SERVICE_ACCOUNT}}
          workload_identity_provider: "projects/${{ env.GCP_PROJECT_NUMBER}}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

      - name: "Setup Terraform"
        uses: "hashicorp/setup-terraform@v4"
        with:
          terraform_version: "1.15.6"

      - name: "Terraform FMT"
        run: "terraform fmt -check"

      - name: "Terraform Init"
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ env.GCP_TF_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: "Terraform Plan"
        id: "plan"
        run: "terraform plan -input=false"

      - name: "Terraform Apply"
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
        run: terraform apply -auto-approve -input=false

      - name: "Terraform Destroy"
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false
